[pytest]
# Route pytest tmp dirs to a repo-relative path. /tmp/ is
# cross-platform-hostile: Python on Windows resolves it to C:\tmp\
# which does not exist by default, causing FileNotFoundError on
# fresh clones. .pytest_tmp/ is repo-relative and gitignored.
addopts = --basetemp=.pytest_tmp
testpaths =
    thesis/code/tests
